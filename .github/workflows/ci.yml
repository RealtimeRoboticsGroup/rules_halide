name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Restrict default permissions to read-only.
permissions:
  contents: read

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          # Automatically cache Bazel downloads and build artifacts
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Check Formatting
        if: matrix.os == 'ubuntu-latest'
        run: bazel run //tools:format.check

      - name: Test Root Workspace
        run: bazel test --test_output=errors //...

  test-debian:
    name: Build & Test (Debian Trixie)
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            build-essential \
            unzip \
            python3 \
            libxml2

      - name: Install Bazelisk
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            BAZELISK_ARCH="amd64"
          elif [ "$ARCH" = "aarch64" ]; then
            BAZELISK_ARCH="arm64"
          fi
          curl -s -L "https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-${BAZELISK_ARCH}" -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Test Root Workspace
        run: bazel --batch test --test_output=errors //...
